apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-registration-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-registration
  template:
    metadata:
      labels:
        app: user-registration
    spec:
      containers:
      - name: user-app
        image: vikhyathveluri/java-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: NodePort
  selector:
    app: user-registration
  ports:
  - port: 80
    targetPort: 8080
    
